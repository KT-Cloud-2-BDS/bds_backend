spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auths/**

            - id: member-service
              uri: lb://member-service
              predicates:
                - Path=/api/members/**

            - id: chat-service
              uri: http://${CHAT_SERVICE_HOST}:${CHAT_SERVICE_PORT}
              predicates:
                - Path=/api/chat/**

            - id: notification-service
              uri: http://${NOTIFICATION_SERVICE_HOST}:${NOTIFICATION_SERVICE_PORT}
              predicates:
                - Path=/api/notifications/**

            - id: order-service
              uri: http://${ORDER_SERVICE_HOST}:${ORDER_SERVICE_PORT}
              predicates:
                - Path=/api/orders/**

            - id: payment-service
              uri: http://${PAYMENT_SERVICE_HOST}:${PAYMENT_SERVICE_PORT}
              predicates:
                - Path=/api/payments/**

jwt:
  jwks-uri: http://${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}/oauth2/jwks

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/

internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET}
