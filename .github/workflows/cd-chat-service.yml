name: CD - chat-service

# CI - chat-service이(가) main에서 성공하면 자동 배포
# 배포 로직은 cd-common.yml에 위임 (JAR → Docker 이미지 → ECR → SSM 배포)
on:
  workflow_run:
    workflows: ["CI - chat-service"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write   # OIDC AWS 인증
      contents: read
      actions: read     # CI run의 artifact 다운로드
    uses: ./.github/workflows/cd-common.yml
    with:
      service: chat-service
      # TODO: 실제 application.yml의 server.port에 맞게 수정
      port: "8081"
      ci-run-id: ${{ github.event.workflow_run.id }}
      image-tag: ${{ github.event.workflow_run.head_sha }}
      ssm-path-prefix: /services
    secrets: inherit