name: CI - chat-service

# chat-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/chat-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/chat-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgresql:
        image: postgres:17
        env:
          POSTGRES_DB: chat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 다중 인스턴스 간 메시지 Fan-out을 위한 외부 브로커
      rabbitmq:
        image: rabbitmq:4
        env:
          RABBITMQ_DEFAULT_USER: bds
          RABBITMQ_DEFAULT_PASS: bds1234
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/chat-service
            modules/common
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: chat
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USERNAME: bds
          RABBITMQ_PASSWORD: bds1234
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: ./gradlew :services:chat-service:clean :services:chat-service:build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-service
          path: services/chat-service/build/libs/*[!plain].jar
