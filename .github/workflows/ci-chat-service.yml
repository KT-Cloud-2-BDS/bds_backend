name: CI - chat-service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/chat-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/chat-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgresql:
        image: postgres:17
        env:
          POSTGRES_DB: chat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/chat-service
            modules/common
            build.gradle
            settings.gradle
            gradlew
            gradle

      - name: Build and start RabbitMQ (STOMP enabled)
        run: |
          docker build -t rabbitmq-ci:local \
            -f services/chat-service/docker/rabbitmq/Dockerfile.ci \
            services/chat-service/docker/rabbitmq
          docker run -d --name rabbitmq \
            -p 5672:5672 -p 61613:61613 \
            -e RABBITMQ_DEFAULT_USER=bds \
            -e RABBITMQ_DEFAULT_PASS=bds1234 \
            rabbitmq-ci:local
          for i in $(seq 1 30); do
            if docker exec rabbitmq rabbitmq-diagnostics ping > /dev/null 2>&1; then
              echo "RabbitMQ ready"
              break
            fi
            echo "Waiting for RabbitMQ... ($i/30)"
            sleep 2
          done

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: chat
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USERNAME: bds
          RABBITMQ_PASSWORD: bds1234
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: ./gradlew :services:chat-service:clean :services:chat-service:build :services:chat-service:jacocoTestReport

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: services/chat-service/build/reports/jacoco/test/html/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-service
          path: services/chat-service/build/libs/*[!plain].jar
