name: CD - notification-service (app)

# notification-service 전용 앱 배포 워크플로우. cd-common.yml(전 서비스 공용)과 별개.
# 차이점: docker run에 --network host를 추가해 앱 컨테이너가 EC2 호스트와
# 네트워크를 공유하게 함. docker-compose.prod.yml이 postgres/redis를
# 127.0.0.1:PORT로 호스트에 노출하고 있어, host 네트워크면 컨테이너 안의
# 127.0.0.1이 EC2 호스트의 127.0.0.1과 동일해져 별도 커스텀 네트워크나
# 컨테이너 이름 DNS 없이 바로 연결됨.
# 다른 서비스 CD(cd-common.yml)에는 영향 없음.

on:
  workflow_run:
    workflows:
      - "CI - notification-service"
    types: [completed]
    branches: [main, develop]

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/docker/Dockerfile

      - uses: actions/download-artifact@v4
        with:
          name: notification-service
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: build-jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/notification-service
          TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          JAR=$(ls build-jar/*.jar | head -n 1)
          docker build \
            -f infra/docker/Dockerfile \
            --build-arg JAR_FILE="$JAR" \
            --build-arg SERVER_PORT="8080" \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          docker push --all-tags "$IMAGE"

      - name: Deploy to EC2 via SSM
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SERVICE: notification-service
          TAG: ${{ github.event.workflow_run.head_sha }}
          PORT: "8080"
          SSM_ENV_PATH: /services/notification-service/env
        run: |
          cat > params.json << EOF
          {
            "commands": [
              "aws ssm get-parameter --region $AWS_REGION --name /shared/env --with-decryption --query Parameter.Value --output text > /tmp/$SERVICE.env 2>/dev/null || : > /tmp/$SERVICE.env",
              "aws ssm get-parameter --region $AWS_REGION --name $SSM_ENV_PATH --with-decryption --query Parameter.Value --output text >> /tmp/$SERVICE.env 2>/dev/null || true",
              "chmod 600 /tmp/$SERVICE.env",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY",
              "docker pull $REGISTRY/$SERVICE:$TAG",
              "docker stop $SERVICE || true",
              "docker rm $SERVICE || true",
              "docker run -d --name $SERVICE --restart unless-stopped --network host --env-file /tmp/$SERVICE.env -e SPRING_PROFILES_ACTIVE=prod $REGISTRY/$SERVICE:$TAG",
              "rm -f /tmp/$SERVICE.env",
              "for i in \$(seq 1 30); do sleep 5; if curl -sf http://localhost:$PORT/actuator/health | grep -q '\"status\":\"UP\"'; then echo 'Health check OK'; docker image prune -f; exit 0; fi; done; echo 'Health check FAILED'; docker logs --tail 100 $SERVICE; exit 1"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Service,Values=$SERVICE" \
            --comment "Deploy $SERVICE:$TAG" \
            --timeout-seconds 900 \
            --max-concurrency 1 \
            --max-errors 0 \
            --parameters file://params.json \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deployment result
        run: |
          for i in $(seq 1 120); do
            sleep 10
            STATUSES=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query "CommandInvocations[].Status" --output text)

            echo "[$i/120] 인스턴스 상태: ${STATUSES:-대기 중...}"

            if echo "$STATUSES" | grep -qE "Failed|Cancelled|TimedOut"; then
              echo "❌ 배포 실패 - AWS 콘솔의 SSM Run Command에서 상세 로그 확인"
              exit 1
            fi

            if [ -n "$STATUSES" ] && [ -z "$(echo "$STATUSES" | tr '\t' '\n' | grep -v '^Success$')" ]; then
              echo "✅ 모든 인스턴스 배포 완료"
              exit 0
            fi
          done
          echo "⏰ 배포 대기 타임아웃"
          exit 1
