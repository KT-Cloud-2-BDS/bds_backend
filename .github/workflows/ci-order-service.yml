name: CI - order-service
# order-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/order-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/order-service/**'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d order_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/order-service
            modules/common
            modules/messaging
            libs/bds-events
            build.gradle
            settings.gradle
            gradlew
            gradle

      # MSA 공용 브로커 — order-service는 내부 브로커가 없어 이것 하나만 필요
      # 순정 이미지로 충분 (exchange는 앱이 코드로 선언), vhost는 실환경과 동일하게 msa
      - name: Start MSA RabbitMQ
        run: |
          docker run -d --name rabbitmq-msa \
            -p 5672:5672 \
            -e RABBITMQ_DEFAULT_USER=order-service \
            -e RABBITMQ_DEFAULT_PASS=order1234 \
            -e RABBITMQ_DEFAULT_VHOST=msa \
            rabbitmq:4

      # 시간 내 기동하지 않으면 여기서 즉시 실패시켜 원인이 테스트 실패로 위장되는 것을 방지
      - name: Wait for RabbitMQ
        run: |
          for i in $(seq 1 30); do
            if docker exec rabbitmq-msa rabbitmq-diagnostics -q ping > /dev/null 2>&1; then
              echo "rabbitmq-msa ready"
              break
            fi
            echo "Waiting for rabbitmq-msa... ($i/30)"
            sleep 2
          done
          docker exec rabbitmq-msa rabbitmq-diagnostics -q ping || { echo "rabbitmq-msa failed to start"; exit 1; }

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build and Test
        env:
          # MSA 브로커 (spring.rabbitmq.* — order는 단일 브로커라 표준 네임스페이스 사용)
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: order-service
          RABBITMQ_PASSWORD: order1234
        run: ./gradlew :services:order-service:clean :services:order-service:build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service
          path: services/order-service/build/libs/*[!plain].jar