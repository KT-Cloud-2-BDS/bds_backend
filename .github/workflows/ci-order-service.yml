name: CI - order-service

# order-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/order-service/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'services/order-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d order_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/order-service
            modules/common
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew :services:order-service:clean :services:order-service:build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service
          path: services/order-service/build/libs/*[!plain].jar
