name: CI - order-service

# order-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/order-service/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'services/order-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d order_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4
        env:
          RABBITMQ_DEFAULT_USER: order-service
          RABBITMQ_DEFAULT_PASS: order1234
          RABBITMQ_DEFAULT_VHOST: msa
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/order-service
            modules/common
            modules/messaging
            libs/bds-events
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew :services:order-service:clean :services:order-service:build :services:order-service:jacocoTestReport --stacktrace
        env:
          # MSA 브로커 (spring.rabbitmq.* — order는 단일 브로커라 표준 네임스페이스 사용)
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: order-service
          RABBITMQ_PASSWORD: order1234

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: services/order-service/build/reports/jacoco/test/html/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service
          path: services/order-service/build/libs/*[!plain].jar
