name: CI - notification-service

# notification-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/notification-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/notification-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: notification_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/notification-service
            modules/common
            modules/messaging
            libs/bds-events
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew :services:notification-service:clean :services:notification-service:build -Dspring.profiles.active=dev

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-service
          path: services/notification-service/build/libs/*[!plain].jar
