name: CI - payment-service

# payment-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/payment-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/payment-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # TODO: payment-service DB 확정 후 services 블록 추가
    # 비관적 락(Pessimistic Lock) 및 Saga 패턴 보상 트랜잭션 지원을 위해
    # 강한 트랜잭션 보장이 가능한 DB 필요
    # ex) mysql, postgresql 등

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/payment-service
            modules/common
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew :services:payment-service:clean :services:payment-service:build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-service
          path: services/payment-service/build/libs/*[!plain].jar
