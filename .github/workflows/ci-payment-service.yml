name: CI - payment-service

# payment-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/payment-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'services/payment-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: payment
          MYSQL_USER: payment
          MYSQL_PASSWORD: payment
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4
        env:
          RABBITMQ_DEFAULT_USER: payment-service
          RABBITMQ_DEFAULT_PASS: payment1234
          RABBITMQ_DEFAULT_VHOST: msa
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/payment-service
            modules/common
            modules/messaging
            libs/bds-events
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: payment-service
          RABBITMQ_PASSWORD: payment1234
        run: ./gradlew :services:payment-service:clean :services:payment-service:build :services:payment-service:jacocoTestReport --stacktrace
      
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: services/payment-service/build/reports/jacoco/test/html/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-service
          path: services/payment-service/build/libs/*[!plain].jar
