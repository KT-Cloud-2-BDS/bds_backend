name: CI - gateway-service

# gateway-service 디렉토리 변경 시에만 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'platform/gateway-service/**'
  pull_request:
    branches: [develop]
    paths:
      - 'platform/gateway-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            platform/gateway-service
            modules/common
            build.gradle
            settings.gradle
            gradlew
            gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew :platform:gateway-service:clean :platform:gateway-service:build :platform:gateway-service:jacocoTestReport --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-service
          path: platform/gateway-service/build/libs/*[!plain].jar

      - name: Upload Gateway Service Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-gateway-report
          path: platform/gateway-service/build/reports/jacoco/test/html/
