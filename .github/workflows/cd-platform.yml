name: CD - platform

# CI - platform이 main에서 성공하면 실행
# config-service는 배포하지 않기로 결정 (설정은 GitHub Secrets / Parameter Store로 관리)
# → 현재 배포 대상은 discovery-service 하나
on:
  workflow_run:
    workflows: ["CI - platform", "CI - gateway-service"]
    types: [completed]
    branches: [main,develop]

jobs:
  # CI가 올린 artifact 목록으로 실제 변경(빌드)된 서비스만 추출
  detect-artifacts:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      has_discovery: ${{ steps.list.outputs.has_discovery }}
      has_gateway: ${{ steps.list.outputs.has_gateway }}
    steps:
      - id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAMES=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            --jq '.artifacts[].name')
          echo "has_discovery=$(echo "$NAMES" | grep -qx 'discovery-service' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_gateway=$(echo "$NAMES" | grep -qx 'gateway-service' && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy-discovery:
    needs: detect-artifacts
    if: needs.detect-artifacts.outputs.has_discovery == 'true'
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: ./.github/workflows/cd-common.yml
    with:
      service: discovery-service
      port: "8761"          # Eureka 관례 포트 유지 (ALB 뒤가 아니라 인프라 수정 불필요)
      ci-run-id: ${{ github.event.workflow_run.id }}
      image-tag: ${{ github.event.workflow_run.head_sha }}
      ssm-path-prefix: /platform
    secrets: inherit

  deploy-gateway:
    needs: [detect-artifacts, deploy-discovery]
    if: >-
      always() &&
      needs.detect-artifacts.result == 'success' &&
      needs.detect-artifacts.outputs.has_gateway == 'true' &&
      needs.deploy-discovery.result != 'failure' &&
      needs.deploy-discovery.result != 'cancelled'
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: ./.github/workflows/cd-common.yml
    with:
      service: gateway-service
      port: "8080"
      ci-run-id: ${{ github.event.workflow_run.id }}
      image-tag: ${{ github.event.workflow_run.head_sha }}
      ssm-path-prefix: /platform
    secrets: inherit
