spring:
  application:
    name: order-test

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    virtual-host: msa
    username: ${RABBITMQ_USER:order-service}
    password: ${RABBITMQ_PASSWORD:order1234}
    # 발행 서비스 필수 — confirm 콜백이 동작하기 위한 설정
    publisher-confirm-type: correlated
    publisher-returns: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  flyway:
    enabled: true

logging:
  level:
    com.bds: DEBUG
    org.hibernate.SQL: DEBUG