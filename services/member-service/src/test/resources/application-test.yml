spring:
  datasource:
    url: jdbc:h2:mem:memberdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true

# Auth 서버 역할을 해줄 가짜 서버 주소 매핑
client:
  auth-service:
    url: http://localhost:8081

internal:
  gateway-secret: "test-internal-secret"

eureka:
  client:
    enabled: false