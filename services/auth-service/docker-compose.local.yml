services:
  postgres:
    image: postgres:17
    container_name: bds-auth-postgres-local
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-auth}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bds-auth-redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  auth_postgres_data: