server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

mail:
  host: smtp.naver.com
  port: 465
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        ssl:
          enable: true
          trust: smtp.naver.com
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  expiration:
    access: ${JWT_ACCESS_EXPIRATION}
    refresh: ${JWT_REFRESH_EXPIRATION}
  rsa:
    # 로컬 개발 전용 키
    # 운영 환경(application-prod.yml)에서는 반드시 JWT_RSA_PRIVATE_KEY 환경변수로 주입한다.
    private-key: ${JWT_RSA_PRIVATE_KEY}

internal:
  # 게이트웨이와 다운스트림 서비스가 공유하는 내부 시크릿(로컬 개발 전용 기본값).
  # 운영 환경(application-prod.yml)에서는 반드시 INTERNAL_GATEWAY_SECRET 환경변수로 주입한다.
  gateway-secret: ${INTERNAL_GATEWAY_SECRET:local-dev-internal-secret}