server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            client-id: ${NAVER_CLIENT_ID2}
            client-secret: ${NAVER_CLIENT_SECRET2}
            redirect-uri: http://localhost:8000/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: nickname,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

oauth2:
  frontend-redirect-uri: http://localhost:3000/oauth/callback

mail:
  host: smtp.naver.com
  port: 465
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        ssl:
          enable: true
          trust: smtp.naver.com
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  expiration:
    access: ${JWT_ACCESS_EXPIRATION}
    refresh: ${JWT_REFRESH_EXPIRATION}
  rsa:
    # 로컬 개발 전용 키
    # 운영 환경(application-prod.yml)에서는 반드시 JWT_RSA_PRIVATE_KEY 환경변수로 주입한다.
    private-key: ${JWT_RSA_PRIVATE_KEY}

internal:
  # 게이트웨이와 다운스트림 서비스가 공유하는 내부 시크릿(로컬 개발 전용 기본값).
  # 운영 환경(application-prod.yml)에서는 반드시 INTERNAL_GATEWAY_SECRET 환경변수로 주입한다.
  gateway-secret: ${INTERNAL_GATEWAY_SECRET:local-dev-internal-secret}