spring:
  datasource:
    url: jdbc:h2:mem:authdb;MODE=MySQL
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create

  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            redirect-uri: http://localhost:8000/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: nickname,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

oauth2:
  frontend-redirect-uri: http://localhost:3000/oauth/callback

jwt:
  secret: "test-secret-key-must-be-long-enough-for-hs256-algorithm"
  expiration:
    access: 3600000
    refresh: 604800000

mail:
  host: smtp.naver.com
  port: 465
  username: test-user
  password: test-password

internal:
  gateway-secret: "test-internal-secret"

eureka:
  client:
    enabled: false