spring:
  datasource:
    url: jdbc:h2:mem:authdb;MODE=MySQL
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create

  data:
    redis:
      host: localhost
      port: 6379
jwt:
