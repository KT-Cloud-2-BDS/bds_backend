# 프로덕션 인프라 (postgresql)
# 실행: docker compose -f docker-compose.prod.yml --env-file .env up -d
services:
  postgres:
    image: postgres:17
    container_name: bds-auth-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bds-auth-net

  redis:
    image: redis:7-alpine
    container_name: bds-auth-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - auth_redis_data:/data
    restart: unless-stopped
    networks:
      - bds-auth-net

volumes:
  auth_postgres_data:
  auth_redis_data:

networks:
  bds-auth-net:
    external: true
