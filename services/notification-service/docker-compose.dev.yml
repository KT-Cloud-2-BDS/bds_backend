# 개발 인프라 (PostgreSQL, Redis)
# 실행: docker compose -f docker-compose.dev.yml --env-file .env up -d

services:
  postgres:
    image: postgres:18
    container_name: notification-postgres-dev
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - notification-postgres-dev-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bds-notification-net

  redis:
    image: redis:8
    container_name: notification-redis-dev
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - notification-redis-dev-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bds-notification-net

volumes:
  notification-postgres-dev-data:
  notification-redis-dev-data:

networks:
  bds-notification-net:
    external: true
