services:
  postgres:
    image: postgres:18
    container_name: notification-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - notification-postgres-dev-data:/var/lib/postgresql

  redis:
    image: redis:8
    container_name: notification-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

volumes:
  notification-postgres-dev-data:
