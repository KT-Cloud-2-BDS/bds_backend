spring:
  application:
    name: notification-service
  autoconfigure:
    exclude:
      - org.springframework.modulith.events.amqp.RabbitJackson2Configuration

  modulith:
    events:
      republish-outstanding-events-on-restart: false
      staleness:
        published: 1m
        processing: 5m
        resubmitted: 2m

  flyway:
    enabled: true

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8083