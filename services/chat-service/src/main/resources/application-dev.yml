spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5434}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5674}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

bds:
  msa-broker:
    host: ${MSA_RABBITMQ_HOST:localhost}
    port: ${MSA_RABBITMQ_PORT:5672}
    virtual-host: msa
    username: ${MSA_RABBITMQ_USERNAME:chat-service}
    password: ${MSA_RABBITMQ_PASSWORD}
    
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    jwks-uri: ${AUTH_JWKS_URI:http://localhost:8080/oauth2/jwks}
    issuer: ${AUTH_ISSUER:}
    renew-before: PT2M
    renew-grace: PT1M
    max-anonymous-sessions: 1000

logging:
  level:
    com.bds.chat: DEBUG
