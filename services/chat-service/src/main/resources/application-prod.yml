spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET synchronous_commit = off"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    stomp-port: ${RABBITMQ_STOMP_PORT:61613}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false

bds:
  msa-broker:
    host: ${MSA_RABBITMQ_HOST}
    port: ${MSA_RABBITMQ_PORT}
    virtual-host: msa
    username: ${MSA_RABBITMQ_USERNAME}
    password: ${MSA_RABBITMQ_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    jwks-uri: ${AUTH_JWKS_URI:http://auth-service/oauth2/jwks}
    issuer: ${AUTH_ISSUER}
    renew-before: PT2M
    renew-grace: PT1M
    max-anonymous-sessions: 1000

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10

management:
  server:
    port: 8080

internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET}

logging:
  level:
    com.bds.chat: INFO

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:}