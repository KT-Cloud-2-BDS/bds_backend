spring:
  application:
    name: chat-service
  datasource:
    hikari:
      connection-timeout: 5000
      connection-init-sql: "SET synchronous_commit = off"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: UTC
    datatype:
      datetime:
        write-dates-as-timestamps: false
  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 10s

server:
  port: 8082
