spring:
  config:
    activate:
      on-profile: test

  autoconfigure:
    exclude:
      - org.springframework.modulith.events.amqp.RabbitJackson2Configuration

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:mysql://localhost:3306/payment?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: payment
    password: payment
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # RabbitMQ 설정 (CI에서 컨테이너로 제공)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    virtual-host: msa
    username: ${RABBITMQ_USER:payment-service}
    password: ${RABBITMQ_PASSWORD:payment1234}
    publisher-confirm-type: correlated
    publisher-returns: true

  # Modulith Outbox 활성화 (실제 발행 테스트)
  modulith:
    events:
      externalization:
        enabled: true
      republish-outstanding-events-on-restart: false
      staleness:
        published: 1m
        processing: 5m
        resubmitted: 2m

bds:
  messaging:
    events:
      republish-delay: 30s
      republish-min-age: 1m
      retention: 7d

bank:
  api:
    base-url: http://localhost:8085

internal:
  gateway-secret: "test-internal-secret"