spring:
  config:
    activate:
      on-profile: test

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:mysql://localhost:3306/payment?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: payment
    password: payment
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # RabbitMQ Consumer 자동 시작 비활성화 (테스트 시 큐 없어도 되도록)
  rabbitmq:
    listener:
      simple:
        auto-startup: false

  # Modulith 이벤트 발행 비활성화 (테스트 시 실제 발행 안 함)
  modulith:
    events:
      externalization:
        enabled: false

bank:
  api:
    base-url: http://localhost:8085